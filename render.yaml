# Render Blueprint — deploy with one click
# https://render.com/docs/blueprint-spec
#
# Click "New > Blueprint" on Render dashboard and point at this repo.

services:
  - type: web
    name: nexusmeet-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: PORT
        value: "8000"
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: MONGO_URI
        fromDatabase:
          name: nexusmeet-db
          property: connectionString
    healthCheckPath: /health

  - type: web
    name: nexusmeet-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/build
    envVars:
      - key: REACT_APP_BACKEND_URL
        fromService:
          type: web
          name: nexusmeet-backend
          property: hostport
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: nexusmeet-db
    plan: free
    databaseName: nexusmeet
